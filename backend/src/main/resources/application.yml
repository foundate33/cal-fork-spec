spring:
  application:
    name: cal-fork-backend
  datasource:
    url: jdbc:sqlite:calfork.db
    driver-class-name: org.sqlite.JDBC
    username:
    password:
    hikari:
      maximum-pool-size: 1
  jackson:
    serialization:
      write-dates-as-timestamps: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
server:
  port: 4010

calfork:
  cors:
    allowed-origins: http://localhost:5173

management:
  endpoints:
    web:
      exposure:
        include: info