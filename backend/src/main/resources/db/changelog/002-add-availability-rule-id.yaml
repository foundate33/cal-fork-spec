databaseChangeLog:
  - changeSet:
      id: 002
      author: opencode
      changes:
        - addColumn:
            tableName: event_types
            columns:
              - column:
                  name: availability_rule_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: event_types
            baseColumnNames: availability_rule_id
            referencedTableName: availability_rules
            referencedColumnNames: id
            constraintName: fk_event_types_availability_rule