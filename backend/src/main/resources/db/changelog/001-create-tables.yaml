databaseChangeLog:
  - changeSet:
      id: 001
      author: opencode
      changes:
        - createTable:
            tableName: event_types
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: duration_minutes
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: zoom_link
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: booking_link
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: event_types
            columnNames: slug
            constraintName: uq_event_types_slug
        - addUniqueConstraint:
            tableName: event_types
            columnNames: author_id, slug
            constraintName: uq_event_types_author_slug

        - createTable:
            tableName: availability_rules
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: author_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: days_of_week
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: VARCHAR(5)
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: VARCHAR(5)
                  constraints:
                    nullable: false
              - column:
                  name: timezone
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_type_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: booker_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: booker_email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: booker_notes
                  type: TEXT
              - column:
                  name: zoom_link
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: bookings
            baseColumnNames: event_type_id
            referencedTableName: event_types
            referencedColumnNames: id
            constraintName: fk_bookings_event_type